services:
  # ── AI Service (Python FastAPI) ──────────────────────────────
  - type: web
    name: twinflow-ai-service
    runtime: python
    repo: https://github.com/Utkarsh-Pansare/TwinFlow.git
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        value: AIzaSyDnWmLKhtyTBvq816oAtHYBHMdGShvWMLA
      - key: MAPS_API_KEY
        value: YnDg1pDhwc7VQm5TLY3ufprGTWthhrNT
      - key: BACKEND_API_URL
        fromService:
          name: twinflow-backend
          type: web
          property: host

  # ── Backend (Node.js Express + Prisma) ──────────────────────
  - type: web
    name: twinflow-backend
    runtime: node
    repo: https://github.com/Utkarsh-Pansare/TwinFlow.git
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_g49QkVvLuAlW@ep-divine-paper-aneckh3d.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: REDIS_URL
        value: "redis://localhost:6379"
      - key: AI_SERVICE_URL
        fromService:
          name: twinflow-ai-service
          type: web
          property: hostport
      - key: GEMINI_API_KEY
        value: AIzaSyDnWmLKhtyTBvq816oAtHYBHMdGShvWMLA
      - key: MAPS_API_KEY
        value: YnDg1pDhwc7VQm5TLY3ufprGTWthhrNT
      - key: CORS_ORIGIN
        value: "*"
      - key: API_PREFIX
        value: /api

  # ── Frontend (Vite + React Static Site) ─────────────────────
  - type: web
    name: twinflow-frontend
    runtime: static
    repo: https://github.com/Utkarsh-Pansare/TwinFlow.git
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: twinflow-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_AI_API_URL
        fromService:
          name: twinflow-ai-service
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_TOMTOM_API_KEY
        value: YnDg1pDhwc7VQm5TLY3ufprGTWthhrNT
